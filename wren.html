/* ── MATCH ENGINE ──────────────────────────────────────────────────────── */
function findReply(query) {
  const q = query.toLowerCase().trim();

  // Greetings
  if (/^(hi|hello|hey|howdy|good morning|good afternoon|good evening|hi there|hey there)[\s!.]*$/.test(q)) {
    return KB.find(e => e.id === 'greeting').reply;
  }
  // Thanks
  if (/thank|thanks|thank you/.test(q)) {
    return `<p>You're so welcome! It's what I'm here for.</p><p class="follow-up">Is there anything else I can help you find in the Hub?</p>`;
  }
  // Bye
  if (/^(bye|goodbye|see you|see ya|good bye|farewell)[\s!.]*$/.test(q)) {
    return `<p>Take care! Come back anytime — I'm always here to help you find your way through the Hub. 🐦</p>`;
  }

  let best = null;
  let bestScore = 0;

  for (const entry of KB) {
    if (entry.id === 'fallback') continue;
    let score = 0;
    for (const tag of entry.tags) {
      if (q.includes(tag)) score += tag.split(' ').length; // longer phrase = higher weight
    }
    if (score > bestScore) {
      bestScore = score;
      best = entry;
    }
  }

  if (!best || bestScore === 0) {
    return KB.find(e => e.id === 'fallback').reply;
  }
  return best.reply;
}

/* ── UI ──────────────────────────────────────────────────────────────── */
const chatBody  = document.getElementById('chatBody');
const userInput = document.getElementById('userInput');
const sendBtn   = document.getElementById('sendBtn');
const quickWrap = document.getElementById('quickWrap');

// Welcome message
addWrenMsg(`<p><strong>Hi there! I'm Wren</strong> — your guide to the WCS Elementary Hub.</p>
<p>I can help you find information about reading and math programs, assessments, intervention support, enrichment, the H.U.B. Pathway, and more.</p>
<p><em>Everything I know comes from the Hub Guidelines — just ask!</em></p>`);

// Auto-resize textarea
userInput.addEventListener('input', () => {
  userInput.style.height = 'auto';
  userInput.style.height = Math.min(userInput.scrollHeight, 110) + 'px';
});

// Send on Enter (not Shift+Enter)
userInput.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
});
sendBtn.addEventListener('click', send);

function sendQuick(msg) {
  userInput.value = msg;
  send();
}

function send() {
  const text = userInput.value.trim();
  if (!text) return;

  quickWrap.style.display = 'none';
  addUserMsg(text);
  userInput.value = '';
  userInput.style.height = 'auto';

  // Small delay so it feels like Wren is "thinking"
  setTimeout(() => {
    const reply = findReply(text);
    addWrenMsg(reply);
  }, 320);
}

function addWrenMsg(html) {
  const row = document.createElement('div');
  row.className = 'msg-row wren';
  row.innerHTML = `
    <div class="msg-av" style="background:transparent; overflow:hidden; border:1.5px solid var(--gold);">
      <img src="Wren.png" alt="Wren" style="width:100%;height:100%;object-fit:cover;display:block;">
    </div>
    <div class="msg-bubble">${html}</div>`;
  chatBody.appendChild(row);
  chatBody.scrollTop = chatBody.scrollHeight;
}

function addUserMsg(text) {
  const row = document.createElement('div');
  row.className = 'msg-row user';
  row.innerHTML = `<div class="msg-av">You</div><div class="msg-bubble">${escHtml(text)}</div>`;
  chatBody.appendChild(row);
  chatBody.scrollTop = chatBody.scrollHeight;
}

function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
